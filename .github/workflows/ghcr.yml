name: Build and publish Docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/i9placesolutions/jobvarejo

jobs:
  app:
    name: Build app image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          labels: |
            org.opencontainers.image.source=https://github.com/i9placesolutions/jobvarejo
          tags: |
            type=raw,value=main
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=jobvarejo-app
          cache-to: type=gha,mode=max,scope=jobvarejo-app

      - name: Trigger Coolify deploy
        if: github.ref == 'refs/heads/main'
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APPLICATION_UUID: ${{ secrets.COOLIFY_APPLICATION_UUID }}
        run: |
          if [ -z "$COOLIFY_URL" ] || [ -z "$COOLIFY_TOKEN" ] || [ -z "$COOLIFY_APPLICATION_UUID" ]; then
            echo "Coolify deploy secrets are not configured; skipping deploy trigger."
            exit 0
          fi

          IMAGE_TAG="sha-$(echo "${GITHUB_SHA}" | cut -c1-7)"
          echo "Updating Coolify to ${IMAGE}:${IMAGE_TAG}"

          curl -fsS -X PATCH \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            -H "Content-Type: application/json" \
            "$COOLIFY_URL/api/v1/applications/$COOLIFY_APPLICATION_UUID" \
            -d "{\"build_pack\":\"dockerimage\",\"docker_registry_image_name\":\"${IMAGE}\",\"docker_registry_image_tag\":\"${IMAGE_TAG}\"}"

          curl -fsS \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            "$COOLIFY_URL/api/v1/deploy?uuid=$COOLIFY_APPLICATION_UUID&force=true"
